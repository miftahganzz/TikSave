name: Build TikSave macOS App

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: List available schemes
        run: xcodebuild -list -project TikSave.xcodeproj

      - name: Resolve Swift Packages (if any)
        run: |
          xcodebuild -resolvePackageDependencies \
            -project TikSave.xcodeproj \
            -scheme TikSave

      - name: Build Release (Unsigned)
        run: |
          xcodebuild \
            -project TikSave.xcodeproj \
            -scheme TikSave \
            -configuration Release \
            -sdk macosx \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO

      - name: Show build products
        run: ls -la build/Build/Products/Release/

      - name: Zip .app
        run: |
          APP_PATH="build/Build/Products/Release/TikSave.app"
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" TikSave-macOS.zip

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: TikSave-macOS
          path: TikSave-macOS.zip
